drawer:
  name: drawer
  description: A standard drawer with a handle that can be opened and closed.
  dimensions: [0.2, 0.2, 0.1]
  keypoints:
    handle:
      description: The handle of the drawer used for pulling it open.
      position: [0.1, 0.0, 0.05]
      orientation: [0.0, 0.0, 0.0, 1.0]
    handle_opened:
      description: The position of the handle when the drawer is fully opened.
      position: [0.25, 0.0, 0.05]
      orientation: [0.0, 0.0, 0.0, 1.0]
    push_point:
      description: The point where force is applied to push the drawer.
      position: [0.1, -0.05, 0.05]
      orientation: [0.0, 0.0, 0.0, 1.0]
    push_point_closed:
      description: The position of the handle when the drawer is fully closed.
      position: [0.00, -0.05, 0.05]
      orientation: [0.0, 0.0, 0.0, 1.0]
    above_place:
      description: A position above the drawer for safe placement of objects.
      position: [0.0, 0.0, 0.15]
      orientation: [0.0, 0.0, 0.0, 1.0]
    inside_place:
      description: A designated spot inside the drawer to place objects.
      position: [0.0, 0.0, 0.02]
      orientation: [0.0, 0.0, 0.0, 1.0]
  markers:
    - type: box
      position: [0.0, 0.0, 0.05]
      color: [0.7, 0.5, 0.3, 0.5]
