      position: [0.3856, 0.5801, 0.1230]
      orientation: [0.6981, -0.0024, 0.00299, 0.7159]
      constraints: [1, 1, 1]
      speed: 1.0
    
    - name: home
      arm: left
    - name: home
      arm: right

